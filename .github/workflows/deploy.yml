name: Deploy to Somee

on:
  push:
    branches: ["main"]

jobs:
  ftp-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.x'

      - name: Publish project
        run: dotnet publish backend/backend.csproj -c Release -o publish

      - name: Create app_offline.htm
        run: echo "Updating..." > publish/app_offline.htm

      - name: Upload via FTP
        uses: SamKirkland/FTP-Deploy-Action@4.3.3
        with:
            server: musicstore08.somee.com
            username: ${{ secrets.FTP_USERNAME }}
            password: ${{ secrets.FTP_PASSWORD }}
            server-dir: /www.musicstore08.somee.com/
            local-dir: publish/
